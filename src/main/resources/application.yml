server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: multisport-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/multisport_db}
    username: ${DB_USERNAME:multisport_user}
    password: ${DB_PASSWORD:multisport_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.multideporte.backend: DEBUG
    org.springframework.security: INFO

app:
  cors:
    allowed-origins:
      - http://localhost:4200
  auth:
    session:
      access-token-ttl: 8h
      refresh-token-ttl: 7d
