services:
  postgres:
    image: postgres:16-alpine
    container_name: multisport-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multisport_db}
      POSTGRES_USER: ${POSTGRES_USER:-multisport_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multisport_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multisport_user} -d ${POSTGRES_DB:-multisport_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multisport-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-multisport_db}
      DB_USERNAME: ${POSTGRES_USER:-multisport_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-multisport_pass}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  adminer:
    image: adminer:4.8.1
    container_name: multisport-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"

volumes:
  postgres_data:
